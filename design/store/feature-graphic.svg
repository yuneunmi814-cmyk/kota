<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="500" viewBox="0 0 1024 500" font-family="'Apple SD Gothic Neo','Malgun Gothic','Noto Sans KR',sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1D3557"/>
      <stop offset="1" stop-color="#14253E"/>
    </linearGradient>
  </defs>
  <rect width="1024" height="500" fill="url(#bg)"/>
  <circle cx="120" cy="470" r="280" fill="#FF6B35" opacity="0.12"/>
  <circle cx="1000" cy="30" r="170" fill="#FF6B35" opacity="0.10"/>

  <!-- 브랜드 마크: 게임팩(카트리지) × 핀 -->
  <g transform="translate(72,120)">
    <rect x="0" y="0" width="68" height="92" rx="12" fill="#FF6B35"/>
    <rect x="12" y="30" width="44" height="50" rx="7" fill="#fff"/>
    <path d="M34,40 c-8,0 -13,5.5 -13,12 0,8 13,19 13,19 s13,-11 13,-19 c0,-6.5 -5,-12 -13,-12 z" fill="#1D3557"/>
    <circle cx="34" cy="52" r="4" fill="#fff"/>
  </g>

  <!-- 워드마크 + 태그라인 -->
  <text x="158" y="178" font-size="64" font-weight="800" fill="#ffffff">KOTA</text>
  <text x="160" y="238" font-size="29" font-weight="700" fill="#FFD9C9">검증된 코스를 따라가는, 가장 쉬운 여행</text>
  <text x="160" y="284" font-size="20" fill="#9FB3C8">여행 준비 3시간 → 3분 · 가이드 모드로 도착 체크인</text>

  <!-- 기능 칩 -->
  <g font-size="18" font-weight="600">
    <rect x="160" y="318" width="132" height="38" rx="19" fill="#FF6B35"/><text x="226" y="343" fill="#fff" text-anchor="middle">코스 추천</text>
    <rect x="300" y="318" width="150" height="38" rx="19" fill="#ffffff" opacity="0.12"/><text x="375" y="343" fill="#fff" text-anchor="middle">가이드 모드</text>
    <rect x="458" y="318" width="168" height="38" rx="19" fill="#ffffff" opacity="0.12"/><text x="542" y="343" fill="#fff" text-anchor="middle">크리에이터 마켓</text>
  </g>

  <!-- 우측 폰 목업: 경로 지도 -->
  <g transform="translate(720,58) rotate(-6 115 192)">
    <rect x="0" y="0" width="230" height="384" rx="30" fill="#fff" stroke="#0E1B2E" stroke-width="2"/>
    <rect x="92" y="16" width="46" height="7" rx="3.5" fill="#E7EAEE"/>
    <rect x="16" y="36" width="198" height="250" rx="12" fill="#F2F5F9"/>
    <path d="M58,84 L132,140 L96,210 L166,250" stroke="#FF6B35" stroke-width="5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <g font-size="13" font-weight="700" text-anchor="middle">
      <circle cx="58" cy="84" r="14" fill="#12B76A" stroke="#fff" stroke-width="3"/><text x="58" y="89" fill="#fff">1</text>
      <circle cx="132" cy="140" r="14" fill="#12B76A" stroke="#fff" stroke-width="3"/><text x="132" y="145" fill="#fff">2</text>
      <circle cx="96" cy="210" r="14" fill="#FF6B35" stroke="#fff" stroke-width="3"/><text x="96" y="215" fill="#fff">3</text>
      <circle cx="166" cy="250" r="14" fill="#FF6B35" stroke="#fff" stroke-width="3"/><text x="166" y="255" fill="#fff">4</text>
    </g>
    <rect x="16" y="298" width="198" height="64" rx="12" fill="#fff" stroke="#E7EAEE"/>
    <text x="30" y="322" font-size="11" fill="#8B95A1">다음 목적지</text>
    <text x="30" y="344" font-size="15" font-weight="700" fill="#1D3557">성산일출봉</text>
    <text x="200" y="344" font-size="13" font-weight="700" fill="#FF6B35" text-anchor="end">1.2km</text>
  </g>
</svg>
