  </g>
  <!-- 워드마크 -->
  <text x="82" y="67" font-family="Pretendard, -apple-system, 'Apple SD Gothic Neo', sans-serif" font-size="38" font-weight="600" fill="#1D3557">Travel</text>
  <rect x="226" y="31" width="116" height="46" rx="11" fill="#FF6B35"/>
  <text x="284" y="65" text-anchor="middle" font-family="Pretendard, -apple-system, 'Apple SD Gothic Neo', sans-serif" font-size="34" font-weight="600" fill="#FFFFFF">Pack</text>
</svg>
