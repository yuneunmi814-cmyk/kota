# 로컬에 PostGIS/Redis가 없는 환경용. (Homebrew PostgreSQL+PostGIS 사용 시 불필요)
services:
  db:
    image: postgis/postgis:16-3.4
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: kota
      POSTGRES_PASSWORD: kota
      POSTGRES_DB: kota_dev
    volumes:
      - pgdata:/var/lib/postgresql/data
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
volumes:
  pgdata:
